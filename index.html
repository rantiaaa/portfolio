<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio — Software Engineer</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="shared.css"/>

  <style>
    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.25rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(9,9,16,0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: box-shadow 0.3s;
    }
    nav .logo {
      font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800;
      color: var(--accent); letter-spacing: -0.5px;
    }
    nav .logo span { color: var(--purple-light); }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav ul a {
      font-family: 'DM Mono', monospace; font-size: 0.78rem;
      color: var(--muted); text-decoration: none;
      letter-spacing: 0.05em; transition: color 0.2s;
      position: relative;
    }
    nav ul a::after {
      content: ''; position: absolute; bottom: -3px; left: 0;
      width: 0; height: 1px; background: var(--purple-light); transition: width 0.3s;
    }
    nav ul a:hover, nav ul a.active { color: var(--accent); }
    nav ul a.active::after { width: 100%; }

    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; background: none; border: none;
    }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--accent); transition: all 0.3s; }

    /* ── MOBILE MENU ── */
    .mobile-menu {
      display: none; position: fixed; inset: 0;
      background: rgba(9,9,16,0.97); z-index: 99;
      flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 700;
      color: var(--text); text-decoration: none; transition: color 0.2s;
    }
    .mobile-menu a:hover { color: var(--purple-light); }
    .mobile-close {
      position: absolute; top: 1.5rem; right: 2rem;
      font-size: 1.5rem; color: var(--muted); cursor: pointer;
      background: none; border: none;
    }

    /* ── SCROLL PROGRESS ── */
    #scroll-progress {
      position: fixed; top: 0; left: 0; height: 2px;
      background: linear-gradient(to right, var(--purple), var(--accent));
      z-index: 200; width: 0%; transition: width 0.08s linear;
    }

    /* ── LOADING SCREEN ── */
    #loader {
      position: fixed; inset: 0; z-index: 300;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.25rem;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-ring {
      width: 44px; height: 44px;
      border: 2px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-label {
      font-family: 'DM Mono', monospace; font-size: 0.75rem;
      color: var(--muted); letter-spacing: 0.12em;
    }
    .loader-dots { display: flex; gap: 0.6rem; }
    .loader-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); transition: background 0.3s, transform 0.3s;
    }
    .loader-dot.done { background: var(--purple-light); transform: scale(1.3); }
    .loader-dot.error { background: #ef4444; }

    /* ── APP WRAPPER ── */
    #app { opacity: 0; transition: opacity 0.6s ease; }
    #app.ready { opacity: 1; }

    /* ── FOOTER ── */
    footer {
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
    }
    .footer-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .f-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--accent); }
    .f-copy { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); }
    .f-socials { display: flex; gap: 1rem; }
    .f-socials a { color: var(--muted); font-size: 1rem; transition: color 0.2s; text-decoration: none; }
    .f-socials a:hover { color: var(--purple-light); }

    /* ════════════════════════════════════
       PAGE-SPECIFIC STYLES
    ════════════════════════════════════ */

    /* ── HERO ── */
    #hero {
      display: flex; align-items: center;
      min-height: 100vh; padding-top: 5rem;
    }
    .hero-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 4rem; align-items: center; width: 100%;
    }
    .hero-eyebrow {
      font-family: 'DM Mono', monospace; font-size: 0.8rem;
      letter-spacing: 0.15em; color: var(--purple-light);
      margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .hero-eyebrow .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--purple-light); animation: pulse 2s infinite;
    }
    .hero-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 8vw, 5.5rem); font-weight: 800;
      line-height: 1.05; letter-spacing: -0.03em; color: #fff; margin-bottom: 1.5rem;
    }
    .hero-name .highlight {
      background: linear-gradient(135deg, #a78bfa, #7c3aed, #c4b5fd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-desc { color: var(--muted); font-size: 1.05rem; line-height: 1.75; max-width: 440px; margin-bottom: 2.5rem; }
    .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }
    .hero-photo-wrap { display: flex; justify-content: center; align-items: center; position: relative; }
    .hero-photo-ring { position: relative; width: 320px; height: 320px; flex-shrink: 0; }
    .hero-photo-ring::before {
      content: ''; position: absolute; inset: -3px; border-radius: 50%;
      background: conic-gradient(from 0deg, var(--purple), var(--accent), transparent, var(--purple));
      animation: spin 6s linear infinite; z-index: 0;
    }
    .hero-photo-inner {
      position: absolute; inset: 3px; border-radius: 50%;
      background: var(--bg2); overflow: hidden; z-index: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-photo-inner img { width: 100%; height: 100%; object-fit: cover; }
    .hero-photo-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(145deg, var(--surface), var(--bg2));
      color: var(--muted); font-size: 4rem;
    }
    .hero-photo-badge {
      position: absolute; bottom: 10px; right: -10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.6rem 1rem;
      font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--purple-light);
      display: flex; align-items: center; gap: 0.4rem;
      z-index: 2; backdrop-filter: blur(12px);
    }
    .hero-photo-badge .status-dot {
      width: 6px; height: 6px; background: #4ade80;
      border-radius: 50%; animation: pulse 2s infinite;
    }
    .hero-stats { display: flex; gap: 2rem; margin-top: 3rem; }
    .stat-item { display: flex; flex-direction: column; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }

    /* ── ABOUT ── */
    #about { background: var(--bg2); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }
    .about-heading {
      font-family: 'Syne', sans-serif; font-size: clamp(2.2rem, 4vw, 3.5rem);
      font-weight: 800; line-height: 1.1; letter-spacing: -0.03em; color: #fff; margin-bottom: 1.5rem;
    }
    .about-text { color: var(--muted); font-size: 0.97rem; line-height: 1.8; margin-bottom: 1rem; }
    .stack-title {
      font-family: 'DM Mono', monospace; font-size: 0.72rem;
      letter-spacing: 0.15em; color: var(--purple-light);
      text-transform: uppercase; margin-bottom: 1rem; margin-top: 2rem;
    }
    .tech-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.75rem; }
    .tech-pill {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.55rem 0.9rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      font-family: 'DM Mono', monospace; font-size: 0.72rem;
      color: var(--text); transition: all 0.25s; cursor: default;
    }
    .tech-pill:hover { border-color: var(--purple-light); background: var(--surface2); color: var(--accent); transform: translateY(-2px); }
    .tech-pill .icon { font-size: 1rem; }
    .connect-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-top: 3rem; }
    .connect-title { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 1.5rem; }
    .connect-links { display: flex; flex-direction: column; gap: 0.75rem; }
    .connect-link {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.9rem 1.2rem; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 10px;
      text-decoration: none; color: var(--text); transition: all 0.25s;
    }
    .connect-link:hover { border-color: var(--purple-light); background: var(--surface2); transform: translateX(4px); }
    .cl-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .cl-email { background: #7c3aed22; color: #a78bfa; }
    .cl-linkedin { background: #0a66c222; color: #60a5fa; }
    .cl-github { background: #ffffff11; color: #e2e2f0; }
    .connect-link .cl-text strong { display: block; font-size: 0.88rem; font-weight: 600; }
    .connect-link .cl-text span { font-size: 0.75rem; color: var(--muted); }
    .spec-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
    .spec-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; transition: all 0.25s; }
    .spec-card:hover { border-color: var(--purple); box-shadow: 0 0 20px var(--purple-glow); }
    .spec-card .sc-icon { font-size: 1.5rem; margin-bottom: 0.75rem; }
    .spec-card .sc-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem; color: var(--accent); margin-bottom: 0.4rem; }
    .spec-card .sc-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }

    /* ── PROJECTS ── */
    #projects { background: var(--bg); }
    .projects-heading { font-family: 'Syne', sans-serif; font-size: clamp(2.2rem, 4vw, 3.5rem); font-weight: 800; letter-spacing: -0.03em; color: #fff; margin-bottom: 0.75rem; }
    .projects-sub { color: var(--muted); font-size: 0.97rem; margin-bottom: 3.5rem; }
    .projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: all 0.35s; }
    .project-card:hover { transform: translateY(-6px); border-color: var(--purple); box-shadow: 0 20px 60px rgba(124,58,237,0.15); }
    .project-img-placeholder { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; overflow: hidden; }
    .project-img-placeholder::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 60%, var(--surface)); }
    .project-body { padding: 1.4rem; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.8rem; }
    .project-tag { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--purple-light); background: #7c3aed1a; border: 1px solid #7c3aed33; border-radius: 4px; padding: 0.2rem 0.5rem; }
    .project-name { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 0.6rem; }
    .project-desc { font-size: 0.83rem; color: var(--muted); line-height: 1.65; margin-bottom: 1.2rem; }
    .project-footer { display: flex; align-items: center; justify-content: space-between; }
    .btn-details { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.1rem; background: var(--purple); color: #fff; border-radius: 7px; font-size: 0.8rem; font-weight: 600; text-decoration: none; transition: all 0.25s; }
    .btn-details:hover { background: #6d28d9; transform: translateX(2px); }
    .project-num { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--border); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .hero-grid { grid-template-columns: 1fr; gap: 2.5rem; text-align: center; }
      .hero-photo-wrap { order: -1; justify-content: center; }
      .hero-photo-ring { width: 220px; height: 220px; }
      .hero-desc { margin-left: auto; margin-right: auto; }
      .hero-btns { justify-content: center; }
      .about-grid { grid-template-columns: 1fr; gap: 3rem; }
      .projects-grid { grid-template-columns: repeat(2, 1fr); }
      nav ul { display: none; }
      .hamburger { display: flex; }
    }
    @media (max-width: 600px) {
      section { padding: 6rem 1rem 4rem; }

      /* Hero */
      .hero-grid { gap: 2rem; }
      .hero-photo-ring { width: 170px; height: 170px; }
      .hero-photo-badge {
        right: 50%; transform: translateX(50%);
        bottom: -18px; white-space: nowrap;
        font-size: 0.65rem; padding: 0.45rem 0.8rem;
      }
      .hero-desc { font-size: 0.95rem; margin-bottom: 1.75rem; }
      .hero-btns { flex-direction: column; align-items: center; gap: 0.75rem; }
      .btn-primary, .btn-secondary { width: 100%; max-width: 280px; justify-content: center; }
      .hero-stats { gap: 1.5rem; justify-content: center; }

      /* About */
      .about-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .about-heading { font-size: clamp(1.75rem, 7vw, 2.5rem); }
      .spec-cards { grid-template-columns: 1fr; gap: 0.85rem; }
      .connect-box { padding: 1.4rem; margin-top: 2rem; }
      .connect-link { padding: 0.75rem 0.85rem; gap: 0.75rem; }
      .connect-link .cl-text span { font-size: 0.68rem; word-break: break-all; }
      .cl-icon { width: 34px; height: 34px; font-size: 0.9rem; flex-shrink: 0; }
      .tech-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 0.6rem; }

      /* Projects */
      .projects-grid { grid-template-columns: 1fr; gap: 1.25rem; }
      .projects-heading { font-size: clamp(1.75rem, 7vw, 2.5rem); }
      .project-img-placeholder { height: 160px; }
      .project-body { padding: 1.1rem; }

      /* Footer */
      .footer-inner { flex-direction: column; gap: 1rem; text-align: center; }
      .f-socials { justify-content: center; }
      .edu-card { flex-direction: column; gap: 1rem; }
    }

    @media (max-width: 380px) {
      section { padding: 5.5rem 0.85rem 3.5rem; }
      .hero-photo-ring { width: 150px; height: 150px; }
      .tech-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
    }
  </style>
</head>
<body>

<!-- Cursor Glow -->
<div class="cursor-glow" id="cursorGlow"></div>

<!-- Scroll Progress -->
<div id="scroll-progress"></div>

<!-- Loading Screen -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-label">memuat semua halaman...</div>
  <div class="loader-dots">
    <div class="loader-dot" id="dot-landing"      title="landing"></div>
    <div class="loader-dot" id="dot-about"        title="about"></div>
    <div class="loader-dot" id="dot-projects"     title="projects"></div>
  </div>
</div>

<!-- ── NAV ── -->
<nav id="mainNav">
  <div class="logo"><span>M.</span>A.</div>
  <ul id="navLinks">
    <li><a href="#landing"      data-section="landing">Home</a></li>
    <li><a href="#about"        data-section="about">About</a></li>
    <li><a href="#projects"     data-section="projects">Projects</a></li>
  </ul>
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-close" id="mobileClose"><i class="fas fa-times"></i></button>
  <a href="#landing"      onclick="closeMobile()">Home</a>
  <a href="#about"        onclick="closeMobile()">About</a>
  <a href="#projects"     onclick="closeMobile()">Projects</a>
</div>

<!-- Semua section dari file terpisah akan di-inject di sini -->
<div id="app"></div>

<!-- Footer -->
<footer>
  <div class="footer-inner">
    <div class="f-copy">© 2026 Miranti Anggunsari</div>
    <div class="f-socials">
      <a href="mailto:rantianggunsari@gmail.com"><i class="fas fa-envelope"></i></a>
      <a href="https://linkedin.com/in/miranti-anggunsari" target="_blank"><i class="fab fa-linkedin"></i></a>
      <a href="https://github.com/rantiaaa" target="_blank"><i class="fab fa-github"></i></a>
    </div>
  </div>
</footer>

<script>
  /* ═══════════════════════════════════════════════════════
     PORTFOLIO LOADER
     Semua fragment (hero, about, projects, education) di-fetch
     secara paralel → di-inject berurutan ke satu halaman panjang.
     Nav menjadi scroll-spy: highlight otomatis saat scroll.
  ═══════════════════════════════════════════════════════ */

  const PAGES = ['landing', 'about', 'projects'];

  /* ── Fetch semua halaman secara paralel ── */
  async function loadAllPages() {
    const requests = PAGES.map(name =>
      fetch(`${name}.html`)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.text();
        })
        .then(html => {
          document.getElementById(`dot-${name}`)?.classList.add('done');
          return { name, html };
        })
        .catch(err => {
          document.getElementById(`dot-${name}`)?.classList.add('error');
          return { name, html: makeFallback(name) };
        })
    );
    return Promise.all(requests);
  }

  /* ── Fallback jika file tidak ditemukan ── */
  function makeFallback(name) {
    return `<section id="${name}" style="min-height:50vh;display:flex;align-items:center;justify-content:center;padding:7rem 2rem;">
      <div style="text-align:center">
        <div style="font-size:2rem;margin-bottom:0.6rem">⚠️</div>
        <div style="font-family:'Syne',sans-serif;font-size:1.2rem;color:#fff;margin-bottom:0.4rem">
          ${name}.html tidak ditemukan
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--muted)">
          Pastikan file berada di folder yang sama dengan index.html
        </div>
      </div>
    </section>`;
  }

  /* ── Inject semua konten berurutan ke #app ── */
  function injectAll(pages) {
    document.getElementById('app').innerHTML = pages.map(p => p.html).join('\n');
  }

  /* ── Scroll Progress ── */
  function initScrollProgress() {
    window.addEventListener('scroll', () => {
      const max = document.body.scrollHeight - window.innerHeight;
      const pct = max > 0 ? (window.scrollY / max) * 100 : 0;
      document.getElementById('scroll-progress').style.width = pct + '%';
    }, { passive: true });
  }

  /* ── Scroll-Spy: highlight nav saat section masuk viewport ── */
  function initScrollSpy() {
    const navLinks = document.querySelectorAll('#navLinks a[data-section]');

    const obs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          navLinks.forEach(a =>
            a.classList.toggle('active', a.dataset.section === id)
          );
          // Update URL hash secara diam-diam (tanpa jump)
          history.replaceState(null, '', `#${id}`);
        }
      });
    }, {
      // Section dianggap aktif saat posisinya ada di 40%–55% tengah viewport
      rootMargin: '-40% 0px -55% 0px',
      threshold: 0
    });

    PAGES.forEach(name => {
      const el = document.getElementById(name);
      if (el) obs.observe(el);
    });
  }

  /* ── Fade-up Observer ── */
  function initFadeUp() {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          obs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
  }

  /* ── Smooth scroll untuk nav link & tombol anchor ── */
  function initSmoothNav() {
    document.querySelectorAll('a[href^="#"]').forEach(link => {
      link.addEventListener('click', e => {
        const target = document.querySelector(link.getAttribute('href'));
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth' });
          // Tutup mobile menu jika terbuka
          document.getElementById('mobileMenu').classList.remove('open');
        }
      });
    });
  }

  /* ── Nav shadow on scroll ── */
  function initNavShadow() {
    window.addEventListener('scroll', () => {
      document.getElementById('mainNav').style.boxShadow =
        window.scrollY > 50 ? '0 4px 30px rgba(0,0,0,0.3)' : 'none';
    }, { passive: true });
  }

  /* ── Mobile menu ── */
  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('mobileMenu').classList.add('open');
  });
  document.getElementById('mobileClose').addEventListener('click', closeMobile);
  function closeMobile() {
    document.getElementById('mobileMenu').classList.remove('open');
  }

  /* ── Cursor glow ── */
  const glow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', e => {
    if (glow) { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; }
  }, { passive: true });

  /* ── MAIN INIT ── */
  async function init() {
    // 1. Fetch semua file paralel
    const pages = await loadAllPages();

    // 2. Tunda sebentar agar semua dot loader terlihat ✓
    await new Promise(r => setTimeout(r, 250));

    // 3. Inject semua section ke DOM
    injectAll(pages);

    // 4. Sembunyikan loader, tampilkan konten
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('app').classList.add('ready');

    // 5. Init semua fitur
    initScrollProgress();
    initScrollSpy();
    initFadeUp();
    initSmoothNav();
    initNavShadow();

    // 6. Jika ada hash di URL, scroll ke section tersebut
    const hash = location.hash;
    if (hash) {
      const target = document.querySelector(hash);
      if (target) setTimeout(() => target.scrollIntoView({ behavior: 'smooth' }), 150);
    }
  }

  init();
</script>

</body>
</html>
